name: Sandbox Smoke

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/sandbox-smoke.yml"
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - ".github/workflows/sandbox-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run sandbox smoke tests
        env:
          # Secondary CI-only optimization. The primary fix lives in the Java
          # executor: it no longer applies POSIX RLIMIT_AS to the JVM (a JVM
          # reserves far more *virtual* address space than a tight cap allows,
          # so javac/java could not start on Linux). These options additionally
          # keep the CI JVM lean and fast; heap is still bounded by -Xmx128m and
          # wall time by the per-test timeout. CI-only; no application behavior.
          MALLOC_ARENA_MAX: "1"
          JAVA_TOOL_OPTIONS: "-XX:+UseSerialGC -XX:CompressedClassSpaceSize=24m -XX:ReservedCodeCacheSize=24m -XX:MaxMetaspaceSize=96m -Xss512k"
        run: |
          python -m unittest discover -s backend/tests -p "test_sandbox_smoke.py" -v
