[build]
builder = "NIXPACKS"
buildCommand = "pip install -r backend/requirements.txt"

[deploy]
startCommand = "bash backend/scripts/railway_start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Temporary wildcard — replace with your Railway frontend URL once known:
#   https://<your-frontend>.railway.app
# In production also set ENVIRONMENT=production to enable safety checks.
[variables]
CORS_ORIGINS = "*"

