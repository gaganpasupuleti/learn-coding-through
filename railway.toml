[build]
builder = "NIXPACKS"
buildCommand = "pip install -r backend/requirements.txt"

[deploy]
# Repo root on Railway; backend API lives under backend/
startCommand = "bash backend/scripts/railway_start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ENVIRONMENT must NOT be 'production' unless you have set a strong SECRET_KEY
# and a proper CORS_ORIGINS list — the production validator will reject '*' and
# crash the app before uvicorn can bind, causing the healthcheck to fail.
[variables]
ENVIRONMENT = "development"
CORS_ORIGINS = "*"

