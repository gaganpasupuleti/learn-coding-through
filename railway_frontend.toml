# Railway service config for the frontend (Vite-based app at repo root)
# Generated by automation: Adds a separate Railway service so frontend is deployed independently

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.frontend"

[deploy]
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[variables]
# HTTPS origin of the FastAPI service (no trailing path). The frontend container uses this
# at runtime to nginx-proxy same-origin /api/* and /health to the backend and exposes an
# empty VITE_API_URL to the browser so JSON requests never hit the SPA index.html shell.
VITE_API_URL = "https://your-backend-service.up.railway.app"
NODE_ENV = "production"

# Optional: Add any other frontend-specific env values the project expects (VITE_*, REACT_APP_*, etc.)
