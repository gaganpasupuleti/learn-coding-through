# Railway service config for the frontend (Vite-based app at repo root)
# Generated by automation: Adds a separate Railway service so frontend is deployed independently

[build]
builder = "NIXPACKS"
# Install node deps and build the production assets
buildCommand = "npm ci && npm run build"

[deploy]
# Use Railway preview to serve built assets. Railway provides $PORT via environment.
startCommand = "npm run preview -- --port $PORT"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[variables]
# Replace the placeholders with real service values in Railway dashboard after deploy
# Backend URL used by frontend to call APIs; update to your backend Railway service URL
VITE_API_URL = "https://<backend-railway-url>"
NODE_ENV = "production"

# Optional: Add any other frontend-specific env values the project expects (VITE_*, REACT_APP_*, etc.)
